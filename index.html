<!DOCTYPE html>
<html lang="es">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">
        <title>Blackjack europeo</title>
        <meta name="description" content="Juego de casino blackjack en su modalidad europea.">
        
        <!-- Estilos -->
        <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/styles.css?v=1.1">
        
        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">
        <link rel="icon" type="image/png" sizes="32x32" href="assets/icon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="assets/icon/favicon-16x16.png">
        <link rel="apple-touch-icon" sizes="180x180" href="assets/icon/apple-touch-icon.png">
        <link rel="manifest" href="assets/icon/site.webmanifest">

    </head>

    <body>

        <div class="row container">
            <div class="col mb-1">
                <button id="botonResultado" class="btn btn-info mr-1">R<u>e</u>sultado previo</button>
                <a id="botonReadme" href="https://github.com/almagarinos/blackjack#blackjack" target="_blank" class="btn btn-info mr-1"><u>R</u>eadme</a>
                <a id="botonTutorial" href="https://www.youtube.com/watch?v=q1JwKw_c4r0" target="_blank" class="btn btn-info"><u>T</u>utorial</a> 
            </div>
        </div>

        <div class="row container">
            <div class="col">
                <h3>Crupier: <span>0</span> puntos</h3>
                <div id="cartasCrupier" class="mano-cartas">
                    <!-- Contenido dinámico -->
                </div>
            </div>
        </div>

        <div class="row container">
            <div class="col">
                <h3>Jugador: <span>0</span> puntos</h3>
                <div id="cartasJugador" class="mano-cartas">
                    <!-- Contenido dinámico -->
                </div>
            </div>
        </div>

        <div class="row container">
            <div class="col">
                <button id="botonNuevo" class="btn btn-primary mr-1"><u>N</u>uevo juego</button>
                <button id="botonPedir" class="btn btn-warning mr-1">Pedir <u>c</u>arta</button>
                <button id="botonParar" class="btn btn-danger"><u>P</u>lantarse</button> 
            </div>
        </div>

        <dialog id="dialogoInfo">
            <h4>Último resultado:</h4>
            <p id="textoResultado">Aún no se ha terminado la primera partida...</p>
            <button id="botonContinuar" class="btn btn-info">C<u>o</u>ntinuar</button>
        </dialog>

        <script src="assets/js/underscore-min.js"></script>
        <script src="assets/js/app.js?v=1.1"></script>

    </body>

</html>
